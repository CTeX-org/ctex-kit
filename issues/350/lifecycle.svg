<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080" role="img" aria-labelledby="title desc">
  <title id="title">ctex 与 biblatex 的参考文献标题所有权</title>
  <desc id="desc">ctex 在加载期设置标准名称，biblatex 在文档开始和 Babel 语言切换时根据其 locale strings 重设名称；用户应使用 biblatex 的公开接口。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
    <style>
      .sans { font-family: "Noto Sans CJK SC", "Noto Sans CJK TC", sans-serif; }
      .mono { font-family: "Noto Sans Mono CJK SC", "Noto Sans Mono", monospace; }
      .title { font-size: 46px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 24px; fill: #475569; }
      .box-title { font-size: 28px; font-weight: 700; fill: #0f172a; }
      .body { font-size: 23px; fill: #334155; }
      .code { font-size: 22px; fill: #0f172a; }
      .small { font-size: 20px; fill: #475569; }
      .section { font-size: 28px; font-weight: 700; fill: #0f172a; }
      .accent { font-size: 22px; font-weight: 700; fill: #b91c1c; }
    </style>
  </defs>

  <rect width="1800" height="1080" fill="#f8fafc"/>
  <rect x="42" y="34" width="1716" height="1012" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="100" y="112" class="sans title">Issue #350：参考文献标题的所有权与正确接口</text>
  <text x="100" y="154" class="sans subtitle">ctex 的标准名称键与 biblatex 的 locale 生命周期重叠；这不是一个适合由 ctex 强制接管的层。</text>

  <g filter="url(#shadow)">
    <rect x="100" y="220" width="430" height="310" rx="20" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
    <rect x="685" y="220" width="430" height="310" rx="20" fill="#f3e8ff" stroke="#c084fc" stroke-width="2"/>
    <rect x="1270" y="220" width="430" height="310" rx="20" fill="#ffedd5" stroke="#fb923c" stroke-width="2"/>
  </g>

  <text x="135" y="274" class="sans box-title">1. ctex：加载期</text>
  <text x="135" y="326" class="mono code">\ctexset{bibname = ...}</text>
  <text x="135" y="370" class="sans body">直接设置标准类的</text>
  <text x="135" y="408" class="mono code">\bibname / \refname</text>
  <text x="135" y="462" class="sans small">适合 thebibliography 的传统语义</text>

  <text x="720" y="274" class="sans box-title">2. biblatex：文档开始</text>
  <text x="720" y="326" class="sans body">激活当前语言的 locale strings</text>
  <text x="720" y="370" class="mono code">\let \bibname &lt;- bibliography</text>
  <text x="720" y="408" class="mono code">\let \refname &lt;- references</text>
  <text x="720" y="462" class="sans accent">覆盖前面的标准名称值</text>

  <text x="1305" y="274" class="sans box-title">3. Babel：之后仍可切换</text>
  <text x="1305" y="326" class="mono code">\selectlanguage{...}</text>
  <text x="1305" y="370" class="sans body">再次激活对应 locale strings</text>
  <text x="1305" y="408" class="sans body">一次性的 ctex 后置覆盖</text>
  <text x="1305" y="446" class="sans accent">会再次失效</text>

  <path d="M540,375 L665,375" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="552" y="345" class="sans small">开始文档时</text>
  <path d="M1125,375 L1250,375" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="1140" y="345" class="sans small">语言切换时</text>

  <rect x="100" y="585" width="1600" height="115" rx="18" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="140" y="638" class="sans section">因此不应由 ctex 用私有 \blx@... patch “抢回”标题</text>
  <text x="140" y="676" class="sans body">那会覆盖 bibliography style 的明确选择，并把 locale、子 bibliography、缩略语表和多语言状态的维护责任带进 ctex。</text>

  <text x="100" y="770" class="sans section">按需求使用 biblatex 的公开接口</text>

  <g filter="url(#shadow)">
    <rect x="100" y="810" width="490" height="174" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <rect x="655" y="810" width="490" height="174" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <rect x="1210" y="810" width="490" height="174" rx="18" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
  </g>

  <text x="135" y="858" class="sans box-title">单次标题</text>
  <text x="135" y="905" class="mono code">\printbibliography[title={...}]</text>
  <text x="135" y="947" class="sans small">只影响这一份 bibliography</text>

  <text x="690" y="858" class="sans box-title">当前 locale 的默认文本</text>
  <text x="690" y="905" class="mono code">\DefineBibliographyStrings{...}</text>
  <text x="690" y="947" class="sans small">交给 biblatex 的 strings 生命周期</text>

  <text x="1245" y="858" class="sans box-title">标题结构与层级</text>
  <text x="1245" y="905" class="mono code">\defbibheading{...}</text>
  <text x="1245" y="947" class="sans small">可定义目录、页眉和子 bibliography</text>

  <text x="100" y="1020" class="sans small">完整中文 locale（chinese.lbx）属于 biblatex 上游或专门 bibliography style 的职责；当前 biblatex 3.21 与 dev 均未附带它。</text>
</svg>
