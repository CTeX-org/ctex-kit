name: Agentic llmdoc Updater

on:
  schedule:
    # 每天北京时间 05:00（UTC 21:00）自动更新 llmdoc 文档。
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      since_period:
        description: 检查变更的时间范围
        required: false
        type: string
        default: 24 hours ago

concurrency:
  group: agentic-llmdoc-updater-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-llmdoc:
    if: github.repository == 'CTeX-org/ctex-kit'
    uses: Lightspeed-Intelligence/agentic-workflow-template/.github/workflows/update-llmdoc.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      FEISHU_WEBHOOK_TOKEN: ${{ secrets.FEISHU_LLMDOC_WEBHOOK_TOKEN }}
    with:
      use_feishu_notify: true
      since_period: ${{ inputs.since_period || '24 hours ago' }}
      target_branch: master
