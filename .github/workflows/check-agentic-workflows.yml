name: Check Agentic Workflows

on:
  pull_request:
    paths:
      - '.github/workflows/agentic-*.yml'
      - '.github/workflows/check-agentic-workflows.yml'
      - 'scripts/test-agentic-workflow-contract.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    if: github.repository == 'CTeX-org/ctex-kit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller contracts
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Test Agent reusable workflow callers
        run: python3 scripts/test-agentic-workflow-contract.py
