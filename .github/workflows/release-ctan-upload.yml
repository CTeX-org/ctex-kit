name: Release CTAN upload

# 两阶段 release 流程的「正式发布」阶段:
#   1) push tag → release.yml 自动跑, l3build ctan 打包, 上传到 GitHub
#      Release (prerelease=true). 这是「公测」阶段, 用户可以下载 zip 自测.
#   2) 公测无误 ⟹ 本 workflow 手动触发, 把同一个 GH Release zip 改名后
#      喂给 l3build upload, 投递到 CTAN. CTAN reviewer 接收后正式发布.
#
# 安全设计:
#   - workflow_dispatch only, 无 push trigger ⟹ 不会被打 tag 误触
#   - dry_run 默认 true ⟹ 第一次跑必然是 --dry-run, 不会真上传
#   - announcement 由 LLM 从 .dtx \changes 整理英文, 投递到 CTAN
#   - 上传成功且非 dry-run ⟹ 自动把 GH Release prerelease 翻成 latest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '已发布的 GH Release tag (必填), 如 xeCJK-v3.10.0'
        required: true
        type: string
      uploader:
        description: 'CTAN 上传者真名 (CTAN reviewer 回邮抬头), 如 Liam Huang'
        required: true
        type: string
      email:
        description: 'CTAN 上传者 email (CTAN reviewer 回邮地址)'
        required: true
        type: string
      note:
        description: 'CTAN 内部备注 (可选, ≤4096 字符). 用于告知 CTAN 团队
          维护者变更等需要 reviewer 注意的事项. 留空则不写 note 字段.'
        required: false
        type: string
        default: ''
      dry_run:
        description: '只跑 l3build upload --dry-run, 不真上传'
        required: true
        type: boolean
        default: true
      announce:
        description: '是否生成 + 投递英文 announcement. minor changes
          (typo / 注释 / 小补丁) 可设 false 跳过 announcement, 节省 LLM
          调用并避免 CTAN 邮件列表噪声. false 时整个 prepare-announcement
          的 LLM 步骤跳过, l3build upload 不传 --file.'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  # 跟 test.yml 顶层 env 保持一致, 复用 PR #901 weekly bypass cache (key 含
  # TL_VERSION). 年度 TL 升级只需改这一处 (test.yml / release.yml 同步).
  TL_VERSION: '2026'

jobs:
  # ── 阶段 A: 生成英文 announcement ──────────────────────────────────────
  prepare-announcement:
    if: github.repository == 'CTeX-org/ctex-kit'
    runs-on: ubuntu-latest
    outputs:
      pkg: ${{ steps.parse.outputs.pkg }}
      dir: ${{ steps.parse.outputs.dir }}
      module: ${{ steps.parse.outputs.module }}
      dtx: ${{ steps.parse.outputs.dtx }}
      ver: ${{ steps.parse.outputs.ver }}
      ctan_path: ${{ steps.ctan.outputs.path }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Parse tag
        id: parse
        run: |
          TAG="${{ inputs.tag }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          case "${TAG}" in
            ctex-v*)
              echo "pkg=ctex"       >> "$GITHUB_OUTPUT"
              echo "dir=ctex"       >> "$GITHUB_OUTPUT"
              echo "module=ctex"    >> "$GITHUB_OUTPUT"
              echo "dtx=ctex.dtx"   >> "$GITHUB_OUTPUT"
              echo "ver=${TAG#ctex-v}" >> "$GITHUB_OUTPUT"
              ;;
            xeCJK-v*)
              echo "pkg=xeCJK"      >> "$GITHUB_OUTPUT"
              echo "dir=xeCJK"      >> "$GITHUB_OUTPUT"
              echo "module=xecjk"   >> "$GITHUB_OUTPUT"
              echo "dtx=xeCJK.dtx"  >> "$GITHUB_OUTPUT"
              echo "ver=${TAG#xeCJK-v}" >> "$GITHUB_OUTPUT"
              ;;
            zhlineskip-v*)
              echo "pkg=zhlineskip"        >> "$GITHUB_OUTPUT"
              echo "dir=zhlineskip"        >> "$GITHUB_OUTPUT"
              echo "module=zhlineskip"     >> "$GITHUB_OUTPUT"
              echo "dtx=zhlineskip.dtx"    >> "$GITHUB_OUTPUT"
              echo "ver=${TAG#zhlineskip-v}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::目前只支持 ctex / xeCJK / zhlineskip. 其它包请扩展 Parse tag step." >&2
              exit 1
              ;;
          esac

      - name: Fetch CTAN path from JSON API
        id: ctan
        env:
          PKG_MODULE: ${{ steps.parse.outputs.module }}
        run: |
          # CTAN 的 JSON API 返回 .ctan = {path: "/macros/xetex/latex/xecjk", file: true}.
          # 万一 CTAN 重组结构, 这里直接同步, 不必再手改 build.lua.
          PATH_FROM_CTAN="$(curl -fsSL \
            "https://ctan.org/json/2.0/pkg/${PKG_MODULE}" \
            | jq -r '.ctan.path // empty')"
          if [ -z "$PATH_FROM_CTAN" ]; then
            echo "::error::CTAN API 没返回 ${PKG_MODULE} 的 .ctan.path 路径." >&2
            exit 1
          fi
          echo "path=${PATH_FROM_CTAN}" >> "$GITHUB_OUTPUT"
          echo "  CTAN path: ${PATH_FROM_CTAN}"

      - name: Extract v<ver> changes block
        id: changes
        if: inputs.announce == true
        env:
          DTX_PATH: ${{ steps.parse.outputs.dir }}/${{ steps.parse.outputs.dtx }}
          VER: ${{ steps.parse.outputs.ver }}
        run: |
          # 抽出所有 \changes{v<ver>}{...}{...} 条目 (含 \begin{macrocode} 前的
          # 续行) 写入 changes-context.txt 作为 LLM 的输入材料.
          # 注意: heredoc 必须用 quoted EOF + 零缩进 (python 对前导空格敏感).
          #
          # 与 release.yml 保持一致: RC / pre / alpha / beta tag 共享 base
          # 版本的 \changes 条目, 先用 sed 剥离 prerelease 后缀再 grep.
          # 当前实践中 rc tag 不进入 CTAN upload, 但保持两个 workflow 的
          # 版本号处理逻辑一致, 减少未来误解.
          BASE_VER=$(printf '%s' "${VER}" | sed -E 's/-(rc[0-9]+|pre[0-9]*|alpha[0-9]*|beta[0-9]*)$//')
          export BASE_VER
          python3 > changes-context.txt <<'PYEOF'
          import os
          path = os.environ["DTX_PATH"]
          ver  = os.environ["BASE_VER"]
          with open(path, encoding="utf-8", errors="replace") as f:
              lines = f.read().splitlines()
          marker = f"\\changes{{v{ver}}}"
          out, i = [], 0
          while i < len(lines):
              if marker in lines[i]:
                  buf = [lines[i].lstrip("% ").rstrip()]
                  # 续行: `% ` 开头且不开新 \changes / macrocode block / 空行
                  j = i + 1
                  while j < len(lines):
                      s = lines[j]
                      if not s.startswith("%"): break
                      stripped = s.lstrip("% ").rstrip()
                      if (stripped.startswith("\\changes")
                              or stripped.startswith("\\begin{macrocode}")
                              or stripped.startswith("\\end{macrocode}")
                              or stripped == ""):
                          break
                      buf.append("  " + stripped)
                      j += 1
                  out.append("\n".join(buf))
                  i = j
              else:
                  i += 1
          print("\n\n".join(out))
          PYEOF
          if [ ! -s changes-context.txt ]; then
              echo "::error::No \\changes{v${BASE_VER}} entries found in ${DTX_PATH} (VER=${VER}, BASE_VER=${BASE_VER})" >&2
              exit 1
          fi
          wc -l changes-context.txt

      - name: Fetch previous CTAN announcement for tone reference
        id: prev_ann
        if: inputs.announce == true
        env:
          PKG_MODULE: ${{ steps.parse.outputs.module }}
        run: |
          # CTAN 暴露 announcement 列表的 ID, 我们用 .announcements 字段拿到
          # 最近一条 announcement URL, 然后取它的纯文本做 LLM tone reference.
          # 失败不阻塞 (写个空文件让 LLM 自由发挥).
          if PREV_URL="$(curl -fsSL \
              "https://ctan.org/json/2.0/pkg/${PKG_MODULE}" \
              | jq -r '.announcement[-1].href // empty' 2>/dev/null)" \
             && [ -n "$PREV_URL" ]; then
              curl -fsSL "https://ctan.org${PREV_URL}" \
                > prev-announcement.txt || echo "" > prev-announcement.txt
          else
              echo "" > prev-announcement.txt
          fi
          ls -la prev-announcement.txt

      - name: Install pinned Claude Code CLI
        id: setup_claude
        if: inputs.announce == true
        run: |
          CLAUDE_INSTALL_DIR="$RUNNER_TEMP/claude-code-2.1.80"
          npm install --prefix "$CLAUDE_INSTALL_DIR" @anthropic-ai/claude-code@2.1.80
          echo "path=$CLAUDE_INSTALL_DIR/node_modules/.bin/claude" >> $GITHUB_OUTPUT

      - name: Generate English announcement (LLM)
        id: announce
        if: inputs.announce == true
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        with:
          github_token: ${{ secrets.PAT_TOKEN || github.token }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          path_to_claude_code_executable: ${{ steps.setup_claude.outputs.path }}
          prompt: |
            你是 LaTeX 包发布工程师, 任务是为 CTAN 上传准备英文 announcement.

            包: ${{ steps.parse.outputs.pkg }}
            版本: v${{ steps.parse.outputs.ver }}
            标签: ${{ inputs.tag }}

            **请先 Read 两个本地文件作为材料**:
            - `changes-context.txt`: v${{ steps.parse.outputs.ver }} 的全部 `\changes` 中文条目 (主材料)
            - `prev-announcement.txt`: 上一版 CTAN announcement 英文 (风格参考, 可能为空)

            要求:
            - 输出**英文** announcement, 300-500 词
            - 风格简洁 / 技术性, 参考 prev-announcement.txt 的口吻 (若有)
            - 分类: NEW FEATURES / BUG FIXES / BREAKING CHANGES / DEPRECATIONS
              其中空类直接略掉, 不留标题
            - 每条一句概括 + (#issue) 引用 (若 \changes 提及 #)
            - 末尾两行: source + issue tracker URL
              https://github.com/CTeX-org/ctex-kit
              https://github.com/CTeX-org/ctex-kit/issues
            - **不要直译** \changes 的中文, 要按 LaTeX 包发布的英文表达整理总结
            - 用 Write 工具把最终 announcement 写到 `announcement.md` (与
              changes-context.txt 同目录)

            写完后通过 structured_output 返回该 announcement 的全文.
          claude_args: |
            --model opus --allowedTools "Read,Write,Bash(cat:*),Bash(ls:*),Bash(wc:*)"
            --json-schema '{"type":"object","properties":{"announcement":{"type":"string","description":"完整 announcement 英文文本"},"summary":{"type":"string","description":"一句话摘要 (给 GH Actions step summary 用)"}},"required":["announcement","summary"]}'

      - name: Verify announcement.md exists
        if: inputs.announce == true
        env:
          # 把 structured_output 通过 env 安全传入 (避免 GH Actions 表达式直接
          # 插值到 shell 字符串造成的引号转义/命令注入风险). 仅用于失败时打日志.
          STRUCTURED_OUTPUT: ${{ steps.announce.outputs.structured_output }}
        run: |
          # LLM 已经被 prompt 要求用 Write 工具写 announcement.md. 这里不做
          # heredoc 兜底, 避免把 structured_output 内容直接拼进 shell — 假如
          # LLM 输出含独占一行 "EOF" 类标记, heredoc 会提前终止, 后续被当
          # 命令执行 (注入向量, 即便 LLM 受控也不应该留这种路径).
          if [ ! -s announcement.md ]; then
            echo "::error::LLM 未写入 announcement.md. 检查上一个 step 的日志."
            echo "::group::structured_output (调试用)"
            printf '%s\n' "$STRUCTURED_OUTPUT"
            echo "::endgroup::"
            exit 1
          fi
          echo "=== announcement.md ==="
          cat announcement.md
          echo "======================="
          echo "## Generated Announcement" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat announcement.md >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload announcement artifact
        if: inputs.announce == true
        uses: actions/upload-artifact@v7
        with:
          name: announcement
          path: announcement.md
          retention-days: 90

  # ── 阶段 B: l3build upload (从 GH Release zip 复用) ─────────────────────
  upload-ctan:
    needs: prepare-announcement
    if: github.repository == 'CTeX-org/ctex-kit'
    runs-on: ubuntu-latest
    # Environment gate (仅 live mode 启用):
    # - dry_run=true ⟹ 不进 environment, 任意 collaborator 可跑测试
    # - dry_run=false ⟹ 进 ctan-release-<module>, 等该包 required reviewers
    #   在 GH UI 点 Approve 才放行真上 CTAN. environment 名跟 module (全小写).
    # 需先在 Settings → Environments 建好 environment + 配 required reviewers
    # (+ 可选 wait timer); environment 名缺失会让 job fail.
    environment:
      name: ${{ inputs.dry_run == false && format('ctan-release-{0}', needs.prepare-announcement.outputs.module) || '' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # 这里**故意不 checkout inputs.tag**: upload-ctan job 需要
          # build.lua / support/build-config.lua 的最新版本 (含 uploadconfig
          # builder), 而 tag 指向的历史 commit 可能早于 release pipeline 接入,
          # 那时 build.lua 还没 uploadconfig, l3build 会拿到空 author 而 abort.
          # 实际的 zip 资产由下面 gh release download 拉, 与本次 checkout 无关.

      # PR #901 weekly bypass cache, 跟 test.yml warmup-tl / release.yml 共享同
      # 一个 key (tl-bypass-Linux-2026-<ISO 周>). cache 内是全套 tl_packages 而
      # 不只是 l3build + luatex, 但 restore + PATH export ~10s 还是比 setup-
      # texlive 真装 minimal (~30s) 快, 且不依赖 mirror 通畅.
      - name: Compute TL cache week
        id: tlcache
        run: |
          week="$(TZ=UTC date +'%G-W%V')"
          echo "week=${week}" >> "$GITHUB_OUTPUT"
          echo "TL cache week: ${week}"

      - name: TL bypass cache (restore)
        id: bypass-cache
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/setup-texlive-action/${{ env.TL_VERSION }}
          # key 含 weekly + tl_packages hash. 见 test.yml warmup-tl 同款 key 注释.
          key: tl-bypass-${{ runner.os }}-${{ env.TL_VERSION }}-${{ steps.tlcache.outputs.week }}-${{ hashFiles('.github/tl_packages') }}

      - name: Export PATH (cache hit fast path)
        id: export-path
        if: steps.bypass-cache.outputs.cache-hit == 'true'
        continue-on-error: true
        run: |
          TL_BIN="${{ runner.temp }}/setup-texlive-action/${{ env.TL_VERSION }}/bin/x86_64-linux"
          echo "$TL_BIN" >> "$GITHUB_PATH"
          echo "Added to PATH: $TL_BIN"
          "$TL_BIN/tlmgr" version

      - name: Install TeX Live (minimal for l3build, fallback)
        if: steps.bypass-cache.outputs.cache-hit != 'true' || steps.export-path.outcome == 'failure'
        timeout-minutes: 15
        uses: TeX-Live/setup-texlive-action@v4
        with:
          version: ${{ env.TL_VERSION }}
          # l3build upload 只需要 l3build script 本身 + LuaTeX (用于跑 build.lua).
          # 全套字体 / Unihan / makeindex 都不需要 — 我们不重新打 zip.
          packages: |
            l3build
            luatex
          repository: https://ctan.math.illinois.edu/systems/texlive/tlnet
          # 关闭 setup-texlive 内部 cache, 我们自己用 bypass-cache.
          cache: false

      - name: Download announcement artifact
        if: inputs.announce == true
        uses: actions/download-artifact@v8
        with:
          name: announcement
          path: .

      - name: Download GH Release ctan zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIR: ${{ needs.prepare-announcement.outputs.dir }}
          MODULE: ${{ needs.prepare-announcement.outputs.module }}
        run: |
          mkdir -p downloaded
          gh release download "${{ inputs.tag }}" \
            --pattern '*.zip' \
            --dir downloaded
          # GH Release 上的 zip 文件名是 `<module>-v<ver>-<sha>.zip`,
          # l3build upload 期待 `<DIR>/<module>-ctan.zip`. 改名后放对位置.
          ASSET="$(ls downloaded/*.zip | head -1)"
          if [ -z "$ASSET" ]; then
            echo "::error::GH Release ${{ inputs.tag }} has no zip asset" >&2
            exit 1
          fi
          mv "$ASSET" "${DIR}/${MODULE}-ctan.zip"
          ls -la "${DIR}/${MODULE}-ctan.zip"

      - name: Validate note length
        # CTAN 表单 note 字段上限 4096 byte (l3build-upload.lua ctan_field 写死).
        # 提前在 workflow 内卡掉超长 note 比让 l3build 跑到 CTAN 服务端再返回
        # 错误友好得多 — 后者要等真的 POST 一轮才能拿到反馈.
        # 走 env 不走 ${{ }} 字符串插值, 防 note 内嵌 shell 元字符注入.
        env:
          NOTE: ${{ inputs.note }}
        run: |
          if [ -z "$NOTE" ]; then
            echo "::notice::No CTAN note provided."
            exit 0
          fi
          # 用 wc -c 数 byte; bash 的 ${#NOTE} 在 LANG=C.UTF-8 (GH runner 默认)
          # 下数的是 Unicode 字符数而非 byte 数, 中文等多字节字符会让校验偏宽.
          # CTAN 4096 上限是 byte 级, 必须按 byte 算.
          LEN=$(printf '%s' "$NOTE" | wc -c)
          echo "::notice::CTAN note length: ${LEN} bytes (limit 4096)."
          if [ "$LEN" -gt 4096 ]; then
            echo "::error::CTAN note 超过 4096 byte 上限 (实际 ${LEN}). 请缩短后重新触发 workflow." >&2
            exit 1
          fi

      - name: Run l3build upload
        working-directory: ${{ needs.prepare-announcement.outputs.dir }}
        env:
          # CTAN announcement 文件相对 working-directory (..) 的位置.
          # announce=false ⟹ 不存在该文件, l3build 也不会被传 --file.
          ANN_FILE: ../announcement.md
          # ctex_kit_uploadconfig() 从 env 读 uploader / email, 这样 build.lua
          # 不需要把个人信息硬编码进 git, 本地跑 l3build upload 也是同一套.
          CTAN_UPLOADER: ${{ inputs.uploader }}
          CTAN_EMAIL: ${{ inputs.email }}
          # ctex_kit_uploadconfig() 同样从 env 读 note (CTAN 内部备注).
          # l3build CLI 不暴露 --note, 仅认 uploadconfig.note / note_file.
          # input 留空时 GH Actions 会注入空串 "", build-config.lua 的
          # ctex_kit_env_or_nil() 把空串当成 nil, 不会写入空 note 字段.
          CTAN_NOTE: ${{ inputs.note }}
        run: |
          # announce=true: --file 把 announcement.md 喂给 CTAN announcement 表单.
          # announce=false: 不传 --file, l3build 走 uploadconfig.announcement_file
          # 默认 "announcement.md" → file_contents 找不到文件 → announcement = nil
          # → l3build-upload.lua "Empty announcement: No ctan announcement will be
          # made" 放行 (不强制, 见 l3build-upload.lua L319-320).
          # --email 显式再传一次 (l3build CLI 接受, 兜底防 build.lua 里漏读 env).
          ARGS=()
          if [ "${{ inputs.announce }}" = "true" ]; then
            ARGS+=(--file "$ANN_FILE")
          else
            echo "::notice::announce=false: 跳过 CTAN announcement (--file 不传)."
          fi
          ARGS+=(--email "${{ inputs.email }}")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
            ANSWER=n   # 见下方注释
            echo "::notice::DRY-RUN mode: 不会真投递到 CTAN."
          else
            ANSWER=y
            echo "::warning::LIVE mode: 正在投递到 CTAN."
          fi
          echo "l3build upload ${ARGS[*]}"
          # l3build 在 validate 成功后总会问 "Do you want to upload? [y/n]" —
          # 即便带 --dry-run. 这是 l3build (TL 2026) 的设计 bug:
          # l3build-upload.lua 顶层 `if options["dry-run"] then ctanupload = false end`
          # 把 ctanupload 设为 false, 但随后 l3build-variables.lua 又跑
          # `ctanupload = ctanupload or "ask"`, 用 `or` 会把 false 覆盖成
          # "ask" — 没区分 nil 与 false. 结果 --dry-run 仍会等 stdin.
          # 我们用 stdin 喂答案: dry-run 喂 n (走到 validate 后停止);
          # live 模式喂 y (validate + 真上传).
          printf '%s\n' "$ANSWER" | l3build upload "${ARGS[@]}"

      - name: Mark GH Release as latest (live mode only)
        if: inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 公测期 release.yml 创建的是 prerelease. CTAN 投递成功 ⟹ 翻成正式版.
          gh release edit "${{ inputs.tag }}" --prerelease=false --latest
          echo "::notice::Marked ${{ inputs.tag }} as latest (no longer prerelease)."

      - name: Summary
        if: always()
        env:
          # 走 env 不走 ${{ }} 字符串插值, 防 note 内嵌 shell 元字符
          # (`$(...)` / `` ` `` / `;` / 换行) 注入命令.
          NOTE: ${{ inputs.note }}
        run: |
          echo "## CTAN Upload Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: ${{ needs.prepare-announcement.outputs.pkg }} v${{ needs.prepare-announcement.outputs.ver }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ inputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CTAN Path**: ${{ needs.prepare-announcement.outputs.ctan_path }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Uploader**: ${{ inputs.uploader }} <${{ inputs.email }}>" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: ${{ inputs.dry_run == true && 'DRY-RUN' || 'LIVE' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Announcement**: ${{ inputs.announce == true && 'sent' || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "$NOTE" ]; then
            {
              echo "- **Note to CTAN**:"
              echo '  ```'
              printf '%s\n' "$NOTE" | sed 's/^/  /'
              echo '  ```'
            } >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Result**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
