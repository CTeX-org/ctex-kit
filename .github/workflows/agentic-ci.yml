# 本仓库的 CI 配置 - 调用自身的 reusable workflows
name: Agentic CI

on:
  schedule:
    # 每天北京时间 5:00 (UTC 21:00) 自动更新 llmdoc 文档
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      since_period:
        description: '检查变更的时间范围（默认24小时）'
        required: false
        type: string
        default: '24 hours ago'
  pull_request:
    types: [opened, synchronize, reopened]

# 授予所有 jobs 所需的权限
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  pr-review:
    if: github.event_name == 'pull_request'
    uses: Lightspeed-Intelligence/agentic-workflow-template/.github/workflows/pr-review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      FEISHU_WEBHOOK_TOKEN: ${{ secrets.FEISHU_WEBHOOK_TOKEN }}
    with:
      use_feishu_notify: true

  update-llmdoc:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: Lightspeed-Intelligence/agentic-workflow-template/.github/workflows/update-llmdoc.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      FEISHU_WEBHOOK_TOKEN: ${{ secrets.FEISHU_LLMDOC_WEBHOOK_TOKEN }}
    with:
      use_feishu_notify: true
      since_period: ${{ github.event.inputs.since_period || '24 hours ago' }}
