name: Agentic PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  pr-review:
    # 第三方 reusable workflow 必须固定到已审查的完整提交 SHA；升级时另开 PR 审查。
    uses: Lightspeed-Intelligence/agentic-workflow-template/.github/workflows/pr-review.yml@00a5244ea6150ef6a4c43b680d15d73dafabd343
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      FEISHU_WEBHOOK_TOKEN: ${{ secrets.FEISHU_WEBHOOK_TOKEN }}
    with:
      use_feishu_notify: false
