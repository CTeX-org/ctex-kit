name: ctex-kit test

on:
  pull_request:
    types:
      # added "ready_for_review"
      # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request
      [opened, ready_for_review, reopened, synchronize]
    paths-ignore:
      - 'llmdoc/**'
      - '**/README.md'
      - '**/README-en.md'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '.gitignore'
      - '.gitattributes'
      - '.claude/**'
      - '.githooks/**'
      - '.github/workflows/**'
  push:
    paths-ignore:
      - 'llmdoc/**'
      - '**/README.md'
      - '**/README-en.md'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '.gitignore'
      - '.gitattributes'
      - '.claude/**'
      - '.githooks/**'
      - '.github/workflows/**'
  schedule:
    # at 12:00 UTC (20:00 CST/UTC +8) on Friday
    - cron: "0 12 * * 5"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != 'master' }}

env:
  NOTO_SANS_URL: https://github.com/notofonts/noto-cjk/releases/download/Sans2.004/03_NotoSansCJK-OTC.zip
  NOTO_SERIF_URL: https://github.com/notofonts/noto-cjk/releases/download/Serif2.002/04_NotoSerifCJKOTC.zip

jobs:
  test-ctex:
    strategy:
      matrix:
        include:
        - runs-on: ubuntu-latest
          font-dir: /usr/share/fonts/truetype
          shell: bash
          tl-pkgs: ""
        - runs-on: macos-latest
          font-dir: /Library/Fonts
          shell: bash
          tl-pkgs: ""
        - runs-on: windows-latest
          font-dir: /c/Windows/Fonts
          shell: C:\msys64\usr\bin\bash.exe -e {0}
          # for `unzip` shipped with texlive
          tl-pkgs: wintools.windows

    name: on ${{ matrix.runs-on }}

    runs-on: ${{ matrix.runs-on }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
    - uses: actions/checkout@v7

    - name: Install TeX Live
      timeout-minutes: 30 # fail fast
      uses: TeX-Live/setup-texlive-action@v4
      with:
        package-file: .github/tl_packages
        packages: ${{ matrix.tl-pkgs }}
        repository: https://ctan.math.illinois.edu/systems/texlive/tlnet
        update-all-packages: true

    - name: Install Noto fonts
      run: |
        curl -LO ${{ env.NOTO_SANS_URL }}
        curl -LO ${{ env.NOTO_SERIF_URL }}
        for f in *OTC.zip; do unzip -ojd ${{ matrix.font-dir }} "$f" "*.ttc"; done
        fc-cache -f

    - name: Test ctex
      id: test-ctex
      working-directory: ./ctex
      run: |
        set -x
        # 并行 4 engine, ~5-7min wall-clock (串行 ~20min). 4 个 config 一起
        # 透过 CONFIGS env 喂给每个 engine 进程; 进程间 build/check-<engine>
        # 隔离 (build.lua 通过 L3BUILD_TESTDIR_SUFFIX env 切 testdir).
        CONFIGS="test/config-cmap test/config-contrib test/config-ctxdoc" \
          ../scripts/check-parallel.sh "$L3BUILD_EXTRA_OPTIONS" || {
          echo "::group::patch-health raw log"
          # patch-health.log 可能在两个位置:
          # - build/check-test/config-ctxdoc/patch-health.log (config 串行跑, 默认 testdir 子目录)
          # - tmp/parallel-check/<engine>/ctex/build/check/.../patch-health.log
          #   (主测在 wrapper 独立子工作目录跑)
          # 递归找两类位置.
          for f in build/check-test/config-ctxdoc/patch-health.log \
                   ../tmp/parallel-check/*/ctex/build/check/patch-health.log \
                   build/check-*/patch-health.log; do
            [ -f "$f" ] && { echo "=== $f ==="; cat "$f"; }
          done
          echo "::endgroup::"
          exit 1
        }
      env:
        # see https://github.com/muzimuzhi/latex-zutil/commit/14f74f8085de4f101bcd4e12738043b371afd161
        diffext: .diff
        diffexe: git diff --no-index --text --
        L3BUILD_EXTRA_OPTIONS: ${{ github.event_name == 'schedule' && '--show-saves' || '-H' }}

    - name: Test xeCJK
      if: ${{ !cancelled() }}
      id: test-xecjk
      working-directory: ./xeCJK
      run: |
        set -x
        if [ -d testfiles ] || grep -q 'testfiledir' build.lua 2>/dev/null; then
          l3build check -q "$L3BUILD_EXTRA_OPTIONS"
        else
          echo "No test configuration found, skipping"
        fi
      env:
        diffext: .diff
        diffexe: git diff --no-index --text --
        L3BUILD_EXTRA_OPTIONS: ${{ github.event_name == 'schedule' && '--show-saves' || '-H' }}

    - name: Test zhnumber
      if: ${{ !cancelled() }}
      id: test-zhnumber
      working-directory: ./zhnumber
      run: |
        set -x
        if [ -d testfiles ] || grep -q 'testfiledir' build.lua 2>/dev/null; then
          l3build check -q "$L3BUILD_EXTRA_OPTIONS"
        else
          echo "No test configuration found, skipping"
        fi
      env:
        diffext: .diff
        diffexe: git diff --no-index --text --
        L3BUILD_EXTRA_OPTIONS: ${{ github.event_name == 'schedule' && '--show-saves' || '-H' }}

    - name: Test CJKpunct
      if: ${{ !cancelled() }}
      id: test-cjkpunct
      working-directory: ./CJKpunct
      run: |
        set -x
        if [ -d testfiles ] || grep -q 'testfiledir' build.lua 2>/dev/null; then
          l3build check -q "$L3BUILD_EXTRA_OPTIONS"
        else
          echo "No test configuration found, skipping"
        fi
      env:
        diffext: .diff
        diffexe: git diff --no-index --text --
        L3BUILD_EXTRA_OPTIONS: ${{ github.event_name == 'schedule' && '--show-saves' || '-H' }}

    - name: Test zhlineskip
      if: ${{ !cancelled() }}
      id: test-zhlineskip
      working-directory: ./zhlineskip
      run: |
        set -x
        if [ -d testfiles ] || grep -q 'testfiledir' build.lua 2>/dev/null; then
          l3build check -q "$L3BUILD_EXTRA_OPTIONS" || {
            echo "::group::zhlineskip raw logs"
            for f in build/test/*.log; do
              echo "=== $f ==="
              head -80 "$f" 2>/dev/null || echo "(not found)"
            done
            echo "::endgroup::"
            exit 1
          }
        else
          echo "No test configuration found, skipping"
        fi
      env:
        diffext: .diff
        diffexe: git diff --no-index --text --
        L3BUILD_EXTRA_OPTIONS: ${{ github.event_name == 'schedule' && '--show-saves' || '-H' }}

    - name: Get short commit SHA
      # if-expression starting with "!" must be escaped,
      # since "!" is reserved notation in YAML
      if: ${{ !cancelled() && (steps.test-ctex.outcome == 'failure' || steps.test-xecjk.outcome == 'failure' || steps.test-zhnumber.outcome == 'failure' || steps.test-cjkpunct.outcome == 'failure' || steps.test-zhlineskip.outcome == 'failure') }}
      run: |
        echo "SHA_SHORT=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

    - name: Upload test diffs
      if: ${{ !cancelled() && (steps.test-ctex.outcome == 'failure' || steps.test-xecjk.outcome == 'failure' || steps.test-zhnumber.outcome == 'failure' || steps.test-cjkpunct.outcome == 'failure' || steps.test-zhlineskip.outcome == 'failure') }}
      uses: actions/upload-artifact@v7
      with:
        name: ctex-kit-diff-${{ env.SHA_SHORT }}-${{ runner.os }}
        path: |
          ctex/build/**/*.diff
          xeCJK/build/**/*.diff
          zhnumber/build/**/*.diff
          CJKpunct/build/**/*.diff
          zhlineskip/build/**/*.diff
