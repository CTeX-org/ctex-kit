name: ctex-kit test

on:
  pull_request:
    types:
      # added "ready_for_review"
      # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request
      [opened, ready_for_review, reopened, synchronize]
    paths-ignore:
      - 'llmdoc/**'
      - '**/README.md'
      - '**/README-en.md'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '.gitignore'
      - '.gitattributes'
      - '.claude/**'
      - '.githooks/**'
      - '.github/workflows/**'
  push:
    paths-ignore:
      - 'llmdoc/**'
      - '**/README.md'
      - '**/README-en.md'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '.gitignore'
      - '.gitattributes'
      - '.claude/**'
      - '.githooks/**'
      - '.github/workflows/**'
  schedule:
    # at 12:00 UTC (20:00 CST/UTC +8) on Friday
    - cron: "0 12 * * 5"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != 'master' }}

env:
  NOTO_SANS_URL: https://github.com/notofonts/noto-cjk/releases/download/Sans2.004/03_NotoSansCJK-OTC.zip
  NOTO_SERIF_URL: https://github.com/notofonts/noto-cjk/releases/download/Serif2.002/04_NotoSerifCJKOTC.zip

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # 阶段 0: 检测改了哪些包. push / schedule / workflow_dispatch 触发时
  # 一律跑全包 (回归保险); pull_request 触发时按 path 过滤精确跑.
  # 依赖反查: ctex 依赖 xeCJK + zhnumber, 所以 xeCJK 或 zhnumber 改了也要
  # 跑 ctex.
  # ──────────────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      ctex:       ${{ steps.filter.outputs.ctex }}
      xeCJK:      ${{ steps.filter.outputs.xeCJK }}
      zhnumber:   ${{ steps.filter.outputs.zhnumber }}
      CJKpunct:   ${{ steps.filter.outputs.CJKpunct }}
      zhlineskip: ${{ steps.filter.outputs.zhlineskip }}
    steps:
      - uses: actions/checkout@v7
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          # 对于非 PR 触发, 这个 step 通过 base 比较, 但其实结果会被下游
          # if 强制 true (见下方 needs.changes.outputs).
          filters: |
            # 公共改动 → 全包都要跑
            _all: &all
              - '.github/workflows/test.yml'
              - 'scripts/check-parallel.sh'
              - 'support/**'
              - 'Makefile'
            ctex:
              - *all
              - 'ctex/**'
              # ctex 依赖 xeCJK + zhnumber, 它们改了也要跑 ctex
              - 'xeCJK/**'
              - 'zhnumber/**'
            xeCJK:
              - *all
              - 'xeCJK/**'
            zhnumber:
              - *all
              - 'zhnumber/**'
            CJKpunct:
              - *all
              - 'CJKpunct/**'
            zhlineskip:
              - *all
              - 'zhlineskip/**'

  # ──────────────────────────────────────────────────────────────────────
  # 阶段 1: 各包 × 各 OS 并行测试. 15 个 job 同时跑 (3 OS × 5 pkg).
  # ──────────────────────────────────────────────────────────────────────
  test:
    needs: changes
    strategy:
      # 一个 job 失败不取消其它. 我们想看到所有 OS / 所有 pkg 的结果.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        pkg: [ctex, xeCJK, zhnumber, CJKpunct, zhlineskip]
        include:
          - os: ubuntu-latest
            font-dir: /usr/share/fonts/truetype
            shell: bash
            tl-pkgs: ""
          - os: macos-latest
            font-dir: /Library/Fonts
            shell: bash
            tl-pkgs: ""
          - os: windows-latest
            font-dir: /c/Windows/Fonts
            shell: C:\msys64\usr\bin\bash.exe -e {0}
            # for `unzip` shipped with texlive
            tl-pkgs: wintools.windows

    name: ${{ matrix.pkg }} on ${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    # PR 触发时, 仅当本 pkg 的 path filter 命中才跑. 非 PR 触发
    # (push / schedule / workflow_dispatch) 时直接全跑.
    # GH Actions 表达式不支持 outputs[matrix.pkg] 动态查 key, 用 contains
    # 把 5 个 filter 输出拼成 JSON 再按 pkg 名匹配.
    if: |
      github.event_name != 'pull_request'
      || (matrix.pkg == 'ctex'       && needs.changes.outputs.ctex       == 'true')
      || (matrix.pkg == 'xeCJK'      && needs.changes.outputs.xeCJK      == 'true')
      || (matrix.pkg == 'zhnumber'   && needs.changes.outputs.zhnumber   == 'true')
      || (matrix.pkg == 'CJKpunct'   && needs.changes.outputs.CJKpunct   == 'true')
      || (matrix.pkg == 'zhlineskip' && needs.changes.outputs.zhlineskip == 'true')

    steps:
    - uses: actions/checkout@v7

    - name: Install TeX Live
      timeout-minutes: 30 # fail fast
      uses: TeX-Live/setup-texlive-action@v4
      with:
        package-file: .github/tl_packages
        packages: ${{ matrix.tl-pkgs }}
        repository: https://ctan.math.illinois.edu/systems/texlive/tlnet
        update-all-packages: true

    # 字体缓存: key 含字体 URL hash, URL 变 (升级版本) 自动失效重 download.
    # 缓存内容是已 unzip 的字体目录, 直接 cp 到 OS 字体目录即可.
    - name: Cache CJK fonts
      id: font-cache
      uses: actions/cache@v6
      with:
        path: ~/.cache/ctex-kit-fonts
        key: ctex-kit-fonts-${{ runner.os }}-${{ hashFiles('.github/workflows/test.yml') }}-v1
        # hashFiles 取本 yml hash (URL 改了 → key 变 → 重 download).

    - name: Install Noto fonts
      run: |
        mkdir -p ~/.cache/ctex-kit-fonts
        if [ ! -f ~/.cache/ctex-kit-fonts/.done ]; then
          cd ~/.cache/ctex-kit-fonts
          curl -LO "${{ env.NOTO_SANS_URL }}"
          curl -LO "${{ env.NOTO_SERIF_URL }}"
          for f in *OTC.zip; do unzip -ojd . "$f" "*.ttc"; done
          touch .done
          cd - >/dev/null
        fi
        cp ~/.cache/ctex-kit-fonts/*.ttc "${{ matrix.font-dir }}/"
        fc-cache -f

    - name: Test ${{ matrix.pkg }}
      id: test
      working-directory: ./${{ matrix.pkg }}
      env:
        diffext: .diff
        diffexe: git diff --no-index --text --
        L3BUILD_EXTRA_OPTIONS: ${{ github.event_name == 'schedule' && '--show-saves' || '-H' }}
      run: |
        set -x
        if [ "${{ matrix.pkg }}" = "ctex" ]; then
          # ctex 默认跨 4 engine 跑 181 测试, 用并行 wrapper.
          # wall-clock ~5-8min (串行旧法 ~13-17min).
          CONFIGS="test/config-cmap test/config-contrib test/config-ctxdoc" \
            ../scripts/check-parallel.sh "$L3BUILD_EXTRA_OPTIONS" || {
            echo "::group::patch-health raw log"
            for f in build/check-test/config-ctxdoc/patch-health.log \
                     ../tmp/parallel-check/*/ctex/build/check/patch-health.log \
                     build/check-*/patch-health.log; do
              [ -f "$f" ] && { echo "=== $f ==="; cat "$f"; }
            done
            echo "::endgroup::"
            exit 1
          }
        elif [ "${{ matrix.pkg }}" = "zhlineskip" ]; then
          # zhlineskip 失败时 dump 完整 .log 帮调试 (上游沿用风格).
          if [ -d testfiles ] || grep -q 'testfiledir' build.lua 2>/dev/null; then
            l3build check -q "$L3BUILD_EXTRA_OPTIONS" || {
              echo "::group::zhlineskip raw logs"
              for f in build/test/*.log; do
                echo "=== $f ==="
                head -80 "$f" 2>/dev/null || echo "(not found)"
              done
              echo "::endgroup::"
              exit 1
            }
          else
            echo "No test configuration found, skipping"
          fi
        else
          # xeCJK / zhnumber / CJKpunct 等小包, 默认串行直接跑.
          if [ -d testfiles ] || grep -q 'testfiledir' build.lua 2>/dev/null; then
            l3build check -q "$L3BUILD_EXTRA_OPTIONS"
          else
            echo "No test configuration found, skipping"
          fi
        fi

    - name: Get short commit SHA
      if: ${{ !cancelled() && steps.test.outcome == 'failure' }}
      run: |
        echo "SHA_SHORT=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_ENV"

    - name: Upload test diffs
      if: ${{ !cancelled() && steps.test.outcome == 'failure' }}
      uses: actions/upload-artifact@v7
      with:
        name: ctex-kit-diff-${{ env.SHA_SHORT }}-${{ matrix.pkg }}-${{ runner.os }}
        path: |
          ${{ matrix.pkg }}/build/**/*.diff

  # ──────────────────────────────────────────────────────────────────────
  # 阶段 2: 汇总 — 给分支保护规则用. 如果任何 test 矩阵 job 失败, 这个 job
  # 也 fail. 这样 branch protection 上只盯这一个 status check 就够了, 不
  # 用列 15 个 matrix slot.
  # ──────────────────────────────────────────────────────────────────────
  test-result:
    if: ${{ !cancelled() }}
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Verify all test matrix jobs succeeded or were skipped
        run: |
          if [ "${{ needs.test.result }}" = "success" ] \
             || [ "${{ needs.test.result }}" = "skipped" ]; then
            echo "✓ All test matrix jobs passed or were skipped"
          else
            echo "✗ test result: ${{ needs.test.result }}"
            exit 1
          fi
