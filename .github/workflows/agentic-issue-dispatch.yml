name: Agentic Issue Dispatch

on:
  issues:
    # 只监听 opened，避免后续标签变化重复触发。
    types: [opened]

concurrency:
  group: issue-dispatch-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  issue-dispatch:
    if: github.repository == 'CTeX-org/ctex-kit'
    uses: Lightspeed-Intelligence/agentic-workflow-template/.github/workflows/issue-dispatch.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      FEISHU_WEBHOOK_TOKEN: ${{ secrets.FEISHU_WEBHOOK_TOKEN }}
    with:
      use_feishu_notify: true
